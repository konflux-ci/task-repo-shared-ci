apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: test-greet
spec:
  workspaces:
    - name: tests-workspace
      description: The workspace provided by the test runner script.
  tasks:
    - name: run-greet-task
      taskRef:
        name: greet

    - name: verify-task-ran
      runAfter:
        - run-greet-task
      taskSpec:
        steps:
          - name: check-success
            image: registry.access.redhat.com/ubi9/ubi-minimal:9.6
            script: |
              #!/bin/bash
              set -e
              echo "Greet task completed successfully!"
